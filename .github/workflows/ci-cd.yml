name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean compile

    - name: Run Tests
      run: mvn -B test

    - name: Package application
      run: mvn -B package -DskipTests

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: cash-climb-app
        path: target/*.jar

  analyze:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Analyze with SonarCloud
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      # This step is commented out as it requires SonarCloud configuration
      # Uncomment and configure when SonarCloud is set up
      run: |
        # mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=cashclimb
        echo "SonarCloud analysis disabled. Enable by configuring SonarCloud and uncommenting the command."


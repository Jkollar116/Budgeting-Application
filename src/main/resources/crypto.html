<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crypto Wallet Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-buttons {
            margin: 20px;
            padding: 20px;
            background: #3E1F5B;
            border-radius: 8px;
        }
        .test-wallet {
            margin: 10px 0;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .error-message {
            color: #ff4444;
            padding: 10px;
            margin: 10px 0;
            background: rgba(255,0,0,0.1);
            border-radius: 4px;
        }
        .add-wallet-form {
            margin: 20px;
            padding: 20px;
            background: #3E1F5B;
            border-radius: 8px;
        }
        .add-wallet-form input, .add-wallet-form select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #FF8C00;
            border-radius: 4px;
            background: white;
            color: black;
        }
        .add-wallet-form button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
<header>
    <div class="logo">CashClimb</div>
    <nav>
        <ul>
            <li><a href="home.html">Dashboard</a></li>
            <li><a href="crypto.html">Crypto</a></li>
            <li><a href="chat.html">Chat</a></li>
            <li><a href="index.html">Log Out</a></li>
        </ul>
    </nav>
</header>

<div class="dashboard">
    <div class="card">
        <h2>Crypto Wallets</h2>
        <div id="error-container"></div>

        <!-- Add Custom Wallet Form -->
        <div class="add-wallet-form">
            <h3>Add Custom Wallet</h3>
            <form id="custom-wallet-form">
                <input type="text" id="wallet-label" placeholder="Wallet Label" required>
                <input type="text" id="wallet-address" placeholder="Wallet Address" required>
                <select id="crypto-type" required>
                    <option value="">Select Cryptocurrency</option>
                    <option value="BTC">Bitcoin (BTC)</option>
                    <option value="ETH">Ethereum (ETH)</option>
                </select>
                <button type="submit" class="btn">Add Wallet</button>
            </form>
        </div>

        <!-- Test Buttons -->
        <div class="test-buttons">
            <h3>Test Wallets</h3>
            <button id="add-btc-btn" class="btn">Add Test Bitcoin Wallet</button>
            <button id="add-eth-btn" class="btn">Add Test Ethereum Wallet</button>
            <button id="refresh-all-btn" class="btn">Refresh All Wallets</button>
        </div>

        <div id="wallets-container"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Existing event listeners
        const btcButton = document.getElementById('add-btc-btn');
        const ethButton = document.getElementById('add-eth-btn');
        const refreshButton = document.getElementById('refresh-all-btn');
        const customWalletForm = document.getElementById('custom-wallet-form');

        btcButton.addEventListener('click', addTestBitcoinWallet);
        ethButton.addEventListener('click', addTestEthereumWallet);
        refreshButton.addEventListener('click', refreshAllWallets);

        // Add custom wallet form handler
        customWalletForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const label = document.getElementById('wallet-label').value;
            const address = document.getElementById('wallet-address').value;
            const cryptoType = document.getElementById('crypto-type').value;

            addWallet(label, address, cryptoType);

            // Reset form
            customWalletForm.reset();
        });

        // Initial load
        loadWallets();
    });

    function addTestBitcoinWallet() {
        const wallet = TEST_WALLETS.BTC[currentBTCIndex % TEST_WALLETS.BTC.length];
        currentBTCIndex++;
        addWallet(wallet.label, wallet.address, "BTC");
    }

    function addTestEthereumWallet() {
        const wallet = TEST_WALLETS.ETH[currentETHIndex % TEST_WALLETS.ETH.length];
        currentETHIndex++;
        addWallet(wallet.label, wallet.address, "ETH");
    }

    const TEST_WALLETS = {
        BTC: [
            { address: "1GrwDkr33gT6LuumniYjKEGjTLhsL5kmqC", label: "Test BTC Wallet 1" },
            { address: "1F3bs9gGZcZHHnWQq1EtuqoVBLnTaD9k1A", label: "Test BTC Wallet 2" }
        ],
        ETH: [
            { address: "0xde0b295669a9fd93d5f28d9ec85e40f4cb697bae", label: "Test ETH Wallet 1" },
            { address: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", label: "Test ETH Wallet 2" }
        ]
    };

    let currentBTCIndex = 0;
    let currentETHIndex = 0;

    function showError(message) {
        const errorContainer = document.getElementById('error-container');
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = message;
        errorContainer.appendChild(errorDiv);
        setTimeout(() => errorDiv.remove(), 5000); // Remove after 5 seconds
    }

    function addTestBitcoinWallet() {
        console.log("Adding Bitcoin wallet...");
        const wallet = TEST_WALLETS.BTC[currentBTCIndex % TEST_WALLETS.BTC.length];
        currentBTCIndex++;
        addWallet(wallet.label, wallet.address, "BTC");
    }

    function addTestEthereumWallet() {
        console.log("Adding Ethereum wallet...");
        const wallet = TEST_WALLETS.ETH[currentETHIndex % TEST_WALLETS.ETH.length];
        currentETHIndex++;
        addWallet(wallet.label, wallet.address, "ETH");
    }

    function addWallet(label, address, cryptoType) {
        console.log(`Adding wallet: ${label}, ${address}, ${cryptoType}`);
        fetch('/api/wallets', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                label: label,
                address: address,
                cryptoType: cryptoType
            })
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Success:', data);
                loadWallets();
            })
            .catch(error => {
                console.error('Error:', error);
                showError(`Failed to add wallet: ${error.message}`);
            });
    }

    function loadWallets() {
        console.log("Loading wallets...");
        fetch('/api/wallets')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(wallets => {
                console.log('Loaded wallets:', wallets);
                const container = document.getElementById('wallets-container');
                container.innerHTML = '';
                wallets.forEach(wallet => {
                    const card = createWalletCard(wallet);
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                showError(`Failed to load wallets: ${error.message}`);
            });
    }

    function createWalletCard(wallet) {
        const div = document.createElement('div');
        div.className = 'test-wallet';

        // Format the value with commas and currency symbol
        const formattedValue = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(wallet.value);

        // Format the balance with commas and 8 decimal places
        const formattedBalance = new Intl.NumberFormat('en-US', {
            minimumFractionDigits: 8,
            maximumFractionDigits: 8
        }).format(wallet.balance);

        div.innerHTML = `
        <h3>${wallet.label}</h3>
        <p>Address: ${wallet.address}</p>
        <p>Type: ${wallet.cryptoType}</p>
        <p>Balance: ${formattedBalance} ${wallet.cryptoType}</p>
        <p>Value: ${formattedValue}</p>
        <p>24h Change: ${wallet.change24h?.toFixed(2) || '0.00'}%</p>
        <button onclick="refreshWallet('${wallet.address}')" class="btn">Refresh</button>
    `;
        return div;
    }

    function refreshWallet(address) {
        console.log(`Refreshing wallet: ${address}`);
        fetch(`/api/wallets/${address}/refresh`, {
            method: 'POST'
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Refreshed:', data);
                loadWallets();
            })
            .catch(error => {
                console.error('Error:', error);
                showError(`Failed to refresh wallet: ${error.message}`);
            });
    }

    function refreshAllWallets() {
        console.log("Refreshing all wallets...");
        loadWallets();
    }
</script>
</body>
</html>
